<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grant Proposal Classifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .drag-active {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <div class="max-w-4xl mx-auto px-4 py-12">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">Proposal Classifier</h1>
            <p class="text-lg text-gray-600">Upload your grant documents to automatically classify them as <span class="text-green-600 font-semibold">Flex</span> or <span class="text-cyan-600 font-semibold">Respond</span>.</p>
        </header>

        <!-- Upload Area -->
        <div id="drop-zone" tabindex="0" role="button" aria-label="Upload files. Drag and drop or click to browse." class="bg-white border-2 border-dashed border-gray-300 rounded-xl p-12 text-center transition-all duration-200 cursor-pointer hover:border-blue-400 hover:bg-gray-50 mb-8 shadow-sm focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500">
            <input type="file" id="file-input" multiple class="hidden" accept=".pdf,.docx">
            <div class="flex flex-col items-center pointer-events-none">
                <i class="fas fa-cloud-upload-alt text-5xl text-gray-400 mb-4"></i>
                <p class="text-xl font-medium text-gray-700 mb-1">Drag & Drop files here</p>
                <p class="text-sm text-gray-500">or click to browse (PDF, DOCX)</p>
            </div>
        </div>

        <!-- File List (Pending) -->
        <div id="pending-list" class="mb-8 hidden">
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">Selected Files</h3>
            <ul id="pending-files-ul" class="bg-white rounded-lg shadow-sm border border-gray-200 divide-y divide-gray-100">
                <!-- Items will be added here -->
            </ul>
            <div class="mt-4 text-right">
                <button id="classify-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg shadow transition-colors duration-200 flex items-center inline-flex">
                    <span id="btn-text">Classify Proposals</span>
                    <i id="btn-spinner" class="fas fa-circle-notch fa-spin ml-2 hidden"></i>
                </button>
            </div>
        </div>

        <!-- Results -->
        <div id="results-area" class="hidden">
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">Classification Results</h3>
            <div class="grid gap-4" id="results-grid">
                <!-- Results cards will go here -->
            </div>

            <!-- Summary Stats -->
            <div class="mt-8 bg-white rounded-lg shadow-sm border border-gray-200 p-6 flex justify-around">
                <div class="text-center">
                    <p class="text-sm text-gray-500 uppercase">Flex</p>
                    <p id="count-flex" class="text-3xl font-bold text-green-600">0</p>
                </div>
                <div class="text-center">
                    <p class="text-sm text-gray-500 uppercase">Respond</p>
                    <p id="count-respond" class="text-3xl font-bold text-cyan-600">0</p>
                </div>
            </div>
        </div>

    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col space-y-3 pointer-events-none"></div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const pendingList = document.getElementById('pending-list');
        const pendingFilesUl = document.getElementById('pending-files-ul');
        const classifyBtn = document.getElementById('classify-btn');
        const resultsArea = document.getElementById('results-area');
        const resultsGrid = document.getElementById('results-grid');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');
        const countFlex = document.getElementById('count-flex');
        const countRespond = document.getElementById('count-respond');

        let selectedFiles = [];

        // Drag & Drop Handlers
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, unhighlight, false);
        });

        function highlight(e) {
            dropZone.classList.add('drag-active');
        }

        function unhighlight(e) {
            dropZone.classList.remove('drag-active');
        }

        dropZone.addEventListener('drop', handleDrop, false);
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                fileInput.click();
            }
        });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        function handleFiles(files) {
            selectedFiles = [...selectedFiles, ...files];
            updatePendingList();
        }

        function updatePendingList(focusIndex = -1) {
            if (selectedFiles.length > 0) {
                pendingList.classList.remove('hidden');
                resultsArea.classList.add('hidden'); // Hide results when new files added
            } else {
                pendingList.classList.add('hidden');
            }

            pendingFilesUl.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const li = document.createElement('li');
                li.className = 'p-4 flex justify-between items-center';
                li.innerHTML = `
                    <div class="flex items-center">
                        <i class="far fa-file-alt text-gray-400 mr-3 text-lg"></i>
                        <span class="text-gray-700 font-medium">${file.name}</span>
                        <span class="ml-2 text-xs text-gray-400">(${(file.size / 1024).toFixed(1)} KB)</span>
                    </div>
                    <button
                        class="text-red-400 hover:text-red-600 hover:bg-red-50 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-1 rounded-full p-2 transition-colors"
                        onclick="removeFile(${index})"
                        aria-label="Remove ${file.name}"
                        title="Remove file">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                pendingFilesUl.appendChild(li);

                if (index === focusIndex) {
                    const btn = li.querySelector('button');
                    if (btn) btn.focus();
                }
            });
        }

        window.removeFile = function(index) {
            selectedFiles.splice(index, 1);

            let nextFocusIndex = -1;
            if (selectedFiles.length === 0) {
                dropZone.focus();
            } else {
                // If we deleted the last item, focus the new last item
                // Otherwise focus the item that took the place of the deleted one (same index)
                nextFocusIndex = (index >= selectedFiles.length) ? selectedFiles.length - 1 : index;
            }

            updatePendingList(nextFocusIndex);
        }

        classifyBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            // UI Loading State
            classifyBtn.disabled = true;
            btnText.textContent = 'Processing...';
            btnSpinner.classList.remove('hidden');
            classifyBtn.classList.add('opacity-75', 'cursor-not-allowed');

            const formData = new FormData();
            selectedFiles.forEach(file => {
                formData.append('files', file);
            });

            try {
                const response = await fetch('/api/classify', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                displayResults(data.results);
                showToast('Classification complete!', 'success');

                // Clear selection
                selectedFiles = [];
                updatePendingList();

            } catch (error) {
                console.error('Error:', error);
                showToast('An error occurred during classification.', 'error');
            } finally {
                // Reset Button
                classifyBtn.disabled = false;
                btnText.textContent = 'Classify Proposals';
                btnSpinner.classList.add('hidden');
                classifyBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        });

        function displayResults(results) {
            resultsArea.classList.remove('hidden');
            resultsGrid.innerHTML = '';

            let flex = 0;
            let respond = 0;

            results.forEach(item => {
                let colorClass, bgClass, iconClass, label;

                if (item.type === 'flex') {
                    colorClass = 'text-green-700';
                    bgClass = 'bg-green-50 border-green-200';
                    iconClass = 'fa-check-circle text-green-500';
                    flex++;
                } else if (item.type === 'respond') {
                    colorClass = 'text-cyan-700';
                    bgClass = 'bg-cyan-50 border-cyan-200';
                    iconClass = 'fa-info-circle text-cyan-500';
                    respond++;
                } else {
                    colorClass = 'text-red-700';
                    bgClass = 'bg-red-50 border-red-200';
                    iconClass = 'fa-exclamation-circle text-red-500';
                }

                const aiBadge = item.ai_powered ?
                    `<span class="ml-2 inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-purple-100 text-purple-800" title="Classified by Gemini AI">
                        <i class="fas fa-sparkles mr-1"></i> AI
                    </span>` : '';

                const div = document.createElement('div');
                div.className = `${bgClass} border rounded-lg p-4 flex items-center justify-between shadow-sm transition-transform hover:scale-[1.01]`;
                div.innerHTML = `
                    <div class="flex items-center overflow-hidden">
                        <i class="fas ${iconClass} text-xl mr-4 flex-shrink-0"></i>
                        <div class="truncate">
                            <div class="flex items-center">
                                <h4 class="font-semibold ${colorClass} truncate">${item.filename}</h4>
                                ${aiBadge}
                            </div>
                            <p class="text-sm text-gray-600">${item.classification}</p>
                        </div>
                    </div>
                    <span class="px-3 py-1 rounded-full text-xs font-bold uppercase ${colorClass} bg-white bg-opacity-50">
                        ${item.type}
                    </span>
                `;
                resultsGrid.appendChild(div);
            });

            // Update Counts
            countFlex.textContent = flex;
            countRespond.textContent = respond;

            // Scroll to results
            resultsArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');

            // Icon and colors based on type
            let bgClass, iconClass, role;
            if (type === 'success') {
                bgClass = 'bg-green-600';
                iconClass = 'fa-check-circle';
                role = 'status';
            } else {
                bgClass = 'bg-red-600';
                iconClass = 'fa-exclamation-circle';
                role = 'alert';
            }

            toast.className = `${bgClass} text-white px-6 py-3 rounded-lg shadow-lg flex items-center pointer-events-auto transform transition-all duration-300 translate-y-2 opacity-0`;
            toast.setAttribute('role', role);

            const icon = document.createElement('i');
            icon.className = `fas ${iconClass} mr-3 text-lg`;
            toast.appendChild(icon);

            const textSpan = document.createElement('span');
            textSpan.className = 'font-medium';
            textSpan.textContent = message;
            toast.appendChild(textSpan);

            container.appendChild(toast);

            // Animate in
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            });

            // Remove after 3 seconds
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => {
                    if (container.contains(toast)) {
                        container.removeChild(toast);
                    }
                }, 300); // Wait for fade out
            }, 3000);
        }

    </script>
</body>
</html>
